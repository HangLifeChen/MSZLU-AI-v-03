---
# Redis 持久化存储 (本地存储)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: mszlu-ai
  labels:
    app: redis
    tier: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath  # Mac本地K8s使用hostpath
  resources:
    requests:
      storage: 5Gi

