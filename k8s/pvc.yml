---
# Redis 持久化存储 (NFS)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: mszlu-ai
  labels:
    app: redis
    tier: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 5Gi  # 生产环境增加容量

---
# Elasticsearch 数据存储 (NFS)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: mszlu-ai
  labels:
    app: elasticsearch
    tier: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi  # ES需要较大存储

